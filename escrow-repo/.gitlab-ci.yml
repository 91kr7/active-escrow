# Mock Escrow Repository Pipeline
stages:
  - escrow_build

variables:
  MAVEN_CLI_OPTS: "--batch-mode"

rebuild_job:
  stage: escrow_build
  image: maven:3.9.6-eclipse-temurin-17
  script: |
    echo "Triggered by Active Escrow Consumer!"
    echo "Source Commit Hash received: $SOURCE_COMMIT_HASH"
    echo "Simulating localized rebuild in the secure environment..."
    sleep 3
    # Simulating possible failures to test halt behavior
    if [ "$FORCE_FAIL" == "true" ]; then
      echo "Failure forced via variables. Halting the pipeline constraint!"
      exit 1
    fi
    echo "Escrow Build Completed Successfully."
