stages:
  - build
  - run

build:
  stage: build
  image: maven:3.9.6-eclipse-temurin-17
  script:
    - mvn clean package -DskipTests
  artifacts:
    paths:
      - target/*.jar
    expire_in: 1 hour

run-consumer:
  stage: run
  image: eclipse-temurin:17-jre-alpine
  script:
    - echo "🚀 Starting Consumer App..."
    - java -jar target/consumer-app-0.0.1-SNAPSHOT.jar
  # We don't want the job to timeout too quickly if it's meant to stay alive
  timeout: 1h
