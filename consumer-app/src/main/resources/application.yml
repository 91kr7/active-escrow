spring:
  rabbitmq:
    host: escrow-rabbitmq
    port: 5672
    listener:
      simple:
        concurrency: 1
        max-concurrency: 1
        prefetch: 1
        auto-startup: true
        missing-queues-fatal: false
server:
  port: 8080

logging:
  pattern:
    console: "%msg%n"

escrow:
  provider:
    url: "http://gitlab-source.local" # We host the provider pipeline on the source gitlab to mock the provider environment runner
    token: "Glpat-SourceToken"
    projectId: "2" # Name of the repo serving as the alignment pipeline
  queueName: "build.queue"
